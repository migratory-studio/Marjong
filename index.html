<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麻雀RPG プロトタイプ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Home: top-level mode entry -->
    <section id="home-screen" class="screen menu-screen">
      <header class="menu-head">
        <h1>麻雀RPG <small>プロトタイプ</small></h1>
        <p class="lead">能力で戦う麻雀。まずはフリー対戦から。</p>
      </header>
      <nav class="menu-list">
        <button type="button" class="menu-btn" data-nav="free-battle">
          <span class="menu-btn-title">フリー対戦</span>
          <span class="menu-btn-sub">既存キャラで CPU 対局</span>
        </button>
        <button type="button" class="menu-btn" data-nav="online">
          <span class="menu-btn-title">通信対戦</span>
          <span class="menu-btn-sub">Coming Soon</span>
        </button>
        <button type="button" class="menu-btn" data-nav="settings">
          <span class="menu-btn-title">設定</span>
          <span class="menu-btn-sub">音量</span>
        </button>
      </nav>
    </section>

    <!-- Free battle menu -->
    <section id="free-battle-screen" class="screen menu-screen hidden">
      <header class="menu-head"><h1>フリー対戦</h1></header>
      <nav class="menu-list">
        <button type="button" class="menu-btn" data-nav="select">
          <span class="menu-btn-title">通常フリー対戦</span>
          <span class="menu-btn-sub">既存キャラの固定性能・報酬なし</span>
        </button>
        <button type="button" class="menu-btn" disabled>
          <span class="menu-btn-title">育成反映フリー対戦</span>
          <span class="menu-btn-sub">準備中（Phase 7）</span>
        </button>
      </nav>
      <button type="button" class="ghost-back" data-nav="home">← ホームへ</button>
    </section>

    <!-- Online (coming soon) -->
    <section id="online-screen" class="screen menu-screen hidden">
      <header class="menu-head"><h1>通信対戦</h1></header>
      <div class="coming-soon">
        <div class="coming-soon-badge">Coming Soon</div>
        <p>通信対戦は今後のアップデートで実装予定です。</p>
      </div>
      <button type="button" class="ghost-back" data-nav="home">← ホームへ</button>
    </section>

    <!-- Settings -->
    <section id="settings-screen" class="screen menu-screen hidden">
      <header class="menu-head"><h1>設定</h1></header>
      <div class="settings-card">
        <label class="settings-row">
          <input type="checkbox" id="home-audio-enabled" checked />
          <span>音声を有効化</span>
        </label>
        <div class="settings-row">
          <label for="home-bgm-volume">BGM 音量 <span id="home-bgm-volume-val" class="vol-val">40%</span></label>
          <input type="range" id="home-bgm-volume" min="0" max="100" value="40" />
        </div>
        <div class="settings-row">
          <label for="home-se-volume">SE 音量 <span id="home-se-volume-val" class="vol-val">80%</span></label>
          <input type="range" id="home-se-volume" min="0" max="100" value="80" />
        </div>
      </div>
      <button type="button" class="ghost-back" data-nav="home">← ホームへ</button>
    </section>

    <!-- Character select -->
    <section id="select-screen" class="screen hidden">
      <header class="select-head">
        <button type="button" class="ghost-back select-back" data-nav="free-battle">← 戻る</button>
        <h1>麻雀RPG <small>プロトタイプ</small></h1>
        <p class="lead">アイコンを選んでください。<b>持ち点 = HP</b>、各キャラに固有能力。</p>
      </header>
      <div class="select-layout">
        <div id="char-list" class="char-list"></div>
        <aside id="char-detail" class="char-detail"></aside>
      </div>
      <div class="select-footer">
        <div class="mode-select">
          <span class="mode-label">人数:</span>
          <div class="mode-toggle" id="players-toggle">
            <button type="button" class="mode-btn selected" data-players="4">4人</button>
            <button type="button" class="mode-btn" data-players="3">3人</button>
          </div>
        </div>
        <div class="mode-select">
          <span class="mode-label">対局方式:</span>
          <div class="mode-toggle" id="mode-toggle">
            <button type="button" class="mode-btn selected" data-rounds="1">東風戦</button>
            <button type="button" class="mode-btn" data-rounds="2">半荘戦</button>
          </div>
        </div>
        <button id="start-btn" class="primary" disabled>対局開始</button>
        <button id="scenario-demo-btn" class="secondary" type="button">シナリオ（サンプル）</button>
      </div>
    </section>

    <!-- Scenario player (紙芝居) -->
    <section id="scenario-screen" class="screen hidden"></section>

    <!-- Game table -->
    <section id="game-screen" class="screen hidden">
      <div class="table-wrap">
        <canvas id="table" width="960" height="720"></canvas>
        <div id="action-bar" class="action-bar"></div>
        <div id="banner" class="banner hidden"></div>
        <div id="naki-fx" class="naki-fx"></div>
        <div id="point-fx" class="point-fx"></div>
        <div id="ability-cutin" class="ability-cutin hidden"></div>
        <div id="win-overlay" class="win-overlay hidden"></div>
        <button id="nonaki-btn" class="nonaki-btn" type="button" aria-pressed="false">鳴きなし: OFF</button>
        <button id="settings-btn" class="settings-btn" title="設定" aria-label="設定">⚙</button>
        <div id="settings-panel" class="settings-panel hidden">
          <div class="settings-header">
            <span>設定</span>
            <button id="settings-close" aria-label="閉じる">×</button>
          </div>
          <label class="settings-row">
            <input type="checkbox" id="audio-enabled" checked />
            <span>音声を有効化</span>
          </label>
          <div class="settings-row">
            <label for="bgm-volume">BGM 音量 <span id="bgm-volume-val" class="vol-val">40%</span></label>
            <input type="range" id="bgm-volume" min="0" max="100" value="40" />
          </div>
          <div class="settings-row">
            <label for="se-volume">SE 音量 <span id="se-volume-val" class="vol-val">80%</span></label>
            <input type="range" id="se-volume" min="0" max="100" value="80" />
          </div>
        </div>
      </div>
      <aside class="side">
        <h3>実況ログ</h3>
        <div id="log" class="log"></div>
      </aside>
    </section>
  </div>

  <!-- Shown only on touch devices held in portrait: ask the player to rotate.
       Pure CSS toggle (see styles.css @media), no JS required. -->
  <div id="rotate-prompt" class="rotate-prompt" aria-hidden="true">
    <div class="rotate-prompt-inner">
      <div class="rotate-icon">📱</div>
      <p class="rotate-title">端末を横にしてください</p>
      <p class="rotate-sub">麻雀RPGは横画面でのプレイに最適化されています。</p>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
